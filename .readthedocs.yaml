version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  # Read the Docs uses this to install the engine properly
  apt_packages:
    - texlive-latex-extra
    - texlive-fonts-recommended
    - texlive-latex-recommended
    - texlive-xetex
    - latexmk

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py

formats:
  - pdf
