version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  apt_packages:
    - texlive-latex-extra
    - texlive-fonts-recommended
    - latexmk

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
  # If your index.rst is in docs/source, RTD needs to know:
  # fail_on_warning: true  # Turn this off to debug if it's just a warning killing it
