version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  apt_packages:
    - texlive-latex-extra
    - texlive-fonts-recommended
    - latexmk

python:
  install:
    - requirements: docs/requirements.txt

# This tells RTD exactly where the docs are
sphinx:
  configuration: docs/source/conf.py
