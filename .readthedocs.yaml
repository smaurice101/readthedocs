version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  # This is the correct way to install LaTeX on Read the Docs
  apt_packages:
    - texlive-latex-extra
    - texlive-fonts-recommended
    - latexmk
    - texlive-xetex
    - ghostscript

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py

formats:
  - pdf
  - epub
