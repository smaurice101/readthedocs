version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  apt_packages:
    - texlive-latex-extra
    - texlive-fonts-recommended
    - latexmk

python:
  install:
    - requirements: docs/requirements.txt

# Specify where the source lives so Sphinx doesn't get lost
sphinx:
  configuration: docs/source/conf.py
  # If your .rst files are in docs/source, RTD handles the paths, 
  # but ensure your conf.py doesn't have hardcoded absolute paths.
