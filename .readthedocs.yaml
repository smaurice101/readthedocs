version: "2"

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"
  apt_packages:
    - texlive-latex-extra
    - texlive-fonts-recommended
    - latexmk

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  # Point this to your actual source folder
  configuration: docs/source/conf.py
  fail_on_warning: false 

formats:
  - pdf
